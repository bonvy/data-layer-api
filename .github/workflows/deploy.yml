name: Deploy Quarkus Microservice

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. QUESTO STEP È FONDAMENTALE: scarica il tuo codice sul server
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Poi fai il login al registro Docker
      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Adesso il debug funzionerà e ti mostrerà i file
      - name: Debug - Mostra la struttura delle cartelle attuale
        run: ls -a

      # 4. E infine la build di Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./data-layer-api
          file: ./data-layer-api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest